{% extends "auth/base.html" %}
{% block title %}Student Registration — CareerLaunchpad{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5">
  <div style="width:100%;max-width:480px;">

    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill fs-1" style="color:#6f42c1;"></i>
      <h4 class="fw-bold mt-2">Student Registration</h4>
      <p class="text-muted small">Create your CareerLaunchpad account</p>
    </div>

    <div class="card p-4">
      <form method="POST" action="/register/student">

        <!-- Full name -->
        <div class="mb-3">
          <label class="form-label fw-semibold" for="name">Full name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="name" name="name" class="form-control"
                   placeholder="Jane Doe"
                   value="{{ request.form.get('name','') }}"
                   required>
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="you@college.edu"
                   value="{{ request.form.get('email','') }}"
                   required>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Min 6 characters"
                   required minlength="6">
          </div>
        </div>

        <!-- Department -->
        <div class="mb-3">
          <label class="form-label fw-semibold" for="department">Department</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-building-fill"></i></span>
            <input type="text" id="department" name="department"
                   class="form-control" placeholder="Computer Science and Engineering"
                   value="{{ request.form.get('department','') }}">
          </div>
        </div>

        <div class="row g-3 mb-3">
          <!-- CGPA -->
          <div class="col-6">
            <label class="form-label fw-semibold" for="cgpa">CGPA</label>
            <input type="number" id="cgpa" name="cgpa" class="form-control"
                   placeholder="9.0" step="0.01" min="0" max="10"
                   value="{{ request.form.get('cgpa','') }}">
          </div>
          <!-- Graduation year -->
          <div class="col-6">
            <label class="form-label fw-semibold" for="graduation_year">Grad year</label>
            <input type="number" id="graduation_year" name="graduation_year"
                   class="form-control" placeholder="2026"
                   value="{{ request.form.get('graduation_year','') }}">
          </div>
        </div>

        <!-- Phone -->
        <div class="mb-4">
          <label class="form-label fw-semibold" for="phone">Phone (optional)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
            <input type="tel" id="phone" name="phone" class="form-control"
                   placeholder="+91 98765 43210"
                   value="{{ request.form.get('phone','') }}">
          </div>
        </div>

        <button type="submit" class="btn w-100 text-white fw-semibold"
                style="background:#6f42c1;border-radius:8px;">
          <i class="bi bi-person-plus me-1"></i> Create Student Account
        </button>

      </form>
    </div>

    <p class="text-center text-muted small mt-3">
      Already have an account?
      <a href="/login" class="text-decoration-none" style="color:#6f42c1;">Login here</a>
      &nbsp;·&nbsp;
      <a href="/register/company" class="text-decoration-none" style="color:#6f42c1;">
        Register as Company
      </a>
    </p>

  </div>
</div>
{% endblock %}
